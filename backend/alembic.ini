[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Database URL will be read from environment variable DATABASE_URL
# For local development: postgresql+asyncpg://4updf_user:password@localhost/4updf
# For production VPS2: set DATABASE_URL in environment
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
